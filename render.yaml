# Render Blueprint for HS300 V1.5 Paper Trading
# https://render.com/docs/blueprint-spec
#
# Auto-discovered by Render at repo root. Connect this GitHub repo to
# Render via Blueprint and the dashboard + scheduler are provisioned.
#
# Free tier: no persistent disk. SQLite lives in /tmp; on each cold
# start the dashboard's init_db_schema() copies boot_db.sqlite over,
# so the historical 18 trades are always shown. Live signals from the
# scheduler are lost when the service spins down (free plan: 15 min
# idle). To keep state across spin-downs, upgrade plan to "starter"
# ($7/mo) and add a `disk:` block back.

services:
  - type: web
    name: hs300-paper-trading
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r paper_trading/requirements.txt
    startCommand: gunicorn paper_trading.dashboard:app --bind 0.0.0.0:$PORT --workers 1 --timeout 180
    healthCheckPath: /api/status.json
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PAPER_TRADING_DB
        value: /tmp/paper_trading.db
      - key: RUN_SCHEDULER
        value: "1"
